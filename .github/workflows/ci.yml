name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: git identity (worktree tests)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name ci
      - name: unit tests
        run: python3 -m unittest -q tests.test_forge_gate
      - name: full suite
        run: bash tests/run_all.sh
